<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whirl Hub</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f1a;
    color: #fff;
  }

  header {
    background: #1a1a2e;
    padding: 20px;
    text-align: center;
    border-bottom: 1px solid #333;
  }

  .logo {
    font-size: 28px;
    font-weight: bold;
    color: #7b8cff;
  }

  nav {
    margin-top: 15px;
  }

  nav button {
    background: #2a2a40;
    border: none;
    color: #fff;
    padding: 10px 20px;
    margin: 0 5px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 16px;
  }

  nav button.active,
  nav button:hover {
    background: #7b8cff;
  }

  .container {
    max-width: 900px;
    margin: 40px auto;
    padding: 0 20px;
  }

  .tab {
    display: none;
  }

  .tab.active {
    display: block;
  }

  h2 {
    color: #7b8cff;
    text-align: center;
  }

  /* Music Tab */
  .upload-box {
    text-align: center;
    margin-top: 30px;
    padding: 40px;
    background: #1a1a2e;
    border-radius: 15px;
  }

  input[type="file"] {
    display: none;
  }

  .upload-btn {
    background: #7b8cff;
    padding: 12px 30px;
    border-radius: 25px;
    cursor: pointer;
    display: inline-block;
  }

  audio {
    width: 100%;
    margin-top: 20px;
  }

  /* Sponsors Tab */
  .search {
    width: 100%;
    padding: 12px;
    margin: 20px 0;
    border-radius: 10px;
    border: 1px solid #333;
    background: #1a1a2e;
    color: #fff;
    font-size: 16px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
  }
