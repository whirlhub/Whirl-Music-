<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whirl Music</title>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #0f0f1a;
    color: #fff;
    line-height: 1.6;
  }

  /* Navbar */
  nav {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(15, 15, 26, 0.8);
    backdrop-filter: blur(10px);
    padding: 20px 50px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  nav .logo {
    font-size: 1.5em;
    font-weight: bold;
    background: linear-gradient(90deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  nav ul {
    display: flex;
    list-style: none;
    gap: 30px;
  }

  nav a {
    color: #fff;
    text-decoration: none;
    transition: color 0.3s;
  }

  nav a:hover {
    color: #667eea;
  }

  /* Sections */
  section {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 100px 20px 60px;
    text-align: center;
  }

  #home {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  }

  #about {
    background: #161628;
  }

  #features {
    background: #0f0f1a;
  }

  #contact {
    background: #161628;
  }

  .container {
    max-width: 1000px;
  }

  h1 {
    font-size: 3.5em;
    margin-bottom: 20px;
    background: linear-gradient(90deg, #ff9a9e, #fad0c4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  h2 {
    font-size: 2.5em;
    margin-bottom: 20px;
    color: #667eea;
  }

  p {
    font-size: 1.2em;
    opacity: 0.9;
    max-width: 700px;
    margin-bottom: 30px;
  }

  .btn {
    display: inline-block;
    padding: 15px 40px;
    background: linear-gradient(90deg, #667eea, #764ba2);
    color: #fff;
    text-decoration: none;
    border-radius: 50px;
    font-weight: bold;
    transition: transform 0.3s, box-shadow 0.3s;
    border: none;
    cursor: pointer;
  }

  .btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
  }

  .features-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 30px;
    margin-top: 40px;
    width: 100%;
  }

  .feature-card {
    background: rgba(255, 255, 255, 0.05);
    padding: 30px;
    border-radius: 15px;
    border: 1px solid rgba(255,255,255,0.1);
    transition: transform 0.3s;
  }

  .feature-card:hover {
    transform: translateY(-5px);
    background: rgba(255, 255, 255, 0.08);
  }

  footer {
    padding: 30px;
    text-align: center;
    background: #0f0f1a;
    border-top: 1px solid rgba(255,255,255,0.1);
    opacity: 0.7;
  }

  /* Mobile */
  @media (max-width: 768px) {
    nav {
      padding: 15px 20px;
    }
    nav ul {
      gap: 15px;
      font-size: 0.9em;
    }
    h1 {
      font-size: 2.5em;
    }
    h2 {
      font-size: 2em;
    }
  }
</style>
</head>
<body>

<nav>
  <div class="logo">Wh
