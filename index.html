<!DOCTYPE html>
<html>
<head>
<title>File Test</title>
<style>
  body{background:#0f0f1a;color:white;text-align:center;padding:100px;font-family:sans-serif;}
  input{margin:20px;}
</style>
</head>
<body>
<h1>Test File Upload</h1>
<p>Click the button and pick an MP3</p>
<input type="file" id="file" accept=".mp3,audio/*">
<p id="result"></p>

<script>
document.getElementById('file').addEventListener('change', function(e){
  if(e.target.files[0]){
    document.getElementById('result').textContent = "File selected: " + e.target.files[0].name;
  } else {
    document.getElementById('result').textContent = "No file selected";
  }
});
</script>
</body>
</html>
