<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whirl Music</title>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #000;
    color: #fff;
  }

  /* Main scroll container */
  .feed {
    height: 100vh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scroll-behavior: smooth;
  }

  .feed::-webkit-scrollbar {
    display: none;
  }

  /* Each video/post takes full screen */
  .post {
    height: 100vh;
    width: 100vw;
    scroll-snap-align: start;
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: flex-start;
    background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.8) 100%);
  }

  .post video, .post img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
  }

  .post-content {
    padding: 80px 20px 120px;
    width: 100%;
    z-index: 2;
  }

  .post-title {
    font-size: 1.2em;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .post-desc {
    font-size: 0.95em;
    opacity: 0.9;
    margin-bottom: 15px;
    max-width: 70%;
  }

  /* Right side actions like TikTok */
  .actions {
    position: absolute;
    right: 15px;
    bottom: 120px;
    display: flex;
    flex-direction: column;
    gap: 25px;
    align-items: center;
  }

  .action-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    cursor: pointer;
  }

  .action-icon {
    width: 45px;
    height: 45px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5em;
    backdrop-filter: blur(10px);
  }

  .action-count {
    font-size: 0.8em;
    font-weight: 600;
  }

  /* Top nav */
  .top-nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 15px 20px;
    display: flex;
    justify-content: center;
    gap: 30px;
    z-index: 100;
    background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%);
  }

  .top-nav a {
    color: rgba(255,255,255,0.6);
    text-decoration: none;
    font-weight: 600;
    font-size: 1em;
  }

  .top-nav a.active {
    color: #fff;
  }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #000;
    display: flex;
    justify-content: space-around;
    padding: 10px 0 25px;
    border-top: 1px solid rgba(255,255,255,0.1);
    z-index: 100;
  }

  .bottom-nav a {
    color: #fff;
    text-decoration: none;
    font-size: 0.8em;
    text-align: center;
  }

  .bottom-nav-icon {
    font-size: 1.8em;
    margin-bottom: 2px;
  }

  /* Logo */
  .logo {
    position: fixed;
    top: 60px;
    left: 20px;
    font-size: 1.5em;
    font-weight: bold;
    background: linear-gradient(90deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    z-index: 100;
  }
</style>
</head>
