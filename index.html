<!DOCTYPE html>
<html>
<head>
  <title>Test</title>
  <style>
    body {background: #0f0f1a; color: white; font-family: sans-serif; text-align: center; padding: 50px;}
    button {padding: 15px 30px; background: #667eea; border: none; color: white; border-radius: 10px; cursor: pointer; margin: 10px;}
  </style>
</head>
<body>
  <h1>Whirl Hub Test</h1>
  <p>If you see this, GitHub Pages is working.</p>

  <button onclick="alert('JS is working!')">Test JS</button>

  <input type="file" id="file">
  <audio id="player" controls style="display:block; margin:20px auto;"></audio>

  <script>
    document.getElementById('file').onchange = function(e) {
      const file = e.target.files[0];
      if(file) {
        document.getElementById('player').src = URL.createObjectURL(file);
        document.getElementById('player').style.display = 'block';
      }
    }
  </script>
</body>
   </html>
