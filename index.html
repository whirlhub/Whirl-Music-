<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whirl Hub - Music & University Helper</title>
<meta name="description" content="Upload and play music, plus find university application links in one place.">
<style>
    * {margin: 0; padding: 0; box-sizing: border-box;}
  body {font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f1a; color: #fff; line-height: 1.6;}

  header {background: #161628; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 100;}
 .header-content {max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;}
 .logo {font-size: 1.8em; font-weight: bold; background: linear-gradient(90deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;}

  nav {display: flex; gap: 10px;}
 .tab-btn {padding: 10px 25px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; color: #fff; cursor: pointer; transition: all 0.3s; font-size: 1em;}
 .tab-btn.active,.tab-btn:hover {background: #667eea;}

 .container {max-width: 1200px; margin: 0 auto; padding: 40px 20px;}
 .tab-content {display: none;}
 .tab-content.active {display: block;}

  /* Music Tab */
 .upload-box {background: rgba(255,255,255,0.05); padding: 40px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); text-align: center; max-width: 600px; margin: 40px auto;}
  input[type="file"] {display: none;}
 .upload-label {display: inline-block; padding: 15px 45px; background: linear-gradient(90deg, #667eea, #764ba2); color: #fff; border-radius: 50px; font-weight: bold; cursor: pointer; transition: transform 0.3s;}
 .upload-label:hover {transform: translateY(-3px);}
  audio {width: 100%; margin-top: 25px; display: none;}

  /* University Tab */
 .search-box {margin-bottom: 30px;}
  #searchInput {width: 100%; padding: 15px 20px; font-size: 1.1em; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: #fff; outline: none;}
  #searchInput:focus {border-color: #667eea; background: rgba(255,255,255,0.08);}

 .filters {display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap;}
 .filter-btn {padding: 10px 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; color: #fff; cursor: pointer; transition: all 0.3s;}
 .filter-btn.active,.filter-btn:hover {background: #667eea; border-color: #667eea;}

 .grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px;}

 .card {background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 25px; transition: transform 0.3s, border-color 0.3s;}
