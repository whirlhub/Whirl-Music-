<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whirl Hub - Music Player</title>
<style>
  body {
    background: #0f0f1a;
    color: white;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    text-align: center;
    padding: 50px 20px;
  }
  h1 {
    background: linear-gradient(90deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-size: 2.5em;
    margin-bottom: 10px;
  }
 .box {
    background: rgba(255,255,255,0.05);
    padding: 40px;
    border-radius: 15px;
    border: 1px solid rgba(255,255,255,0.1);
    max-width: 600px;
    margin: 40px auto;
  }
  input[type="file"] {
    display: none;
  }
 .upload-label {
    display: inline-block;
    padding: 15px 45px;
    background: linear-gradient(90deg, #667eea, #764ba2);
    color: #fff;
    border-radius: 50px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.3s;
  }
 .upload-label:hover {
    transform: translateY(-3px);
  }
  audio {
    width: 100%;
    margin-top: 25px;
    display: none;
  }
  #fileName {
    margin-top: 15px;
    opacity: 0.7;
    font-size: 0.9em;
  }
</style>
</head>
<body>

<h1>Whirl Hub</h1>
<p>Pick an MP3 and it plays instantly</p>

<div class="box">
  <label for="audioUpload" class="upload-label">Choose MP3 File</label>
  <input type="file" id="audioUpload" accept=".mp3,audio/*">
  <div id="fileName"></div>
  <audio id="audioPlayer" controls></audio>
</div>

<script>
document.getElementById('audioUpload').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (file) {
    const url = URL.createObjectURL(file);
    const player = document.getElementById('audioPlayer');
    const fileName = document.getElementById('fileName');

    player.src = url;
    player.style.display = 'block';
    fileName.textContent = 'Now playing: ' + file.name;

    player.play().catch(err => {
      console.log('Autoplay blocked. Click play manually.');
    });
  }
});
</script>

</body>
  </html>
